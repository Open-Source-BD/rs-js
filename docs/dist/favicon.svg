<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="hex-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bolt-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hexagon -->
  <path d="M24 2 L42 12.5 L42 35.5 L24 46 L6 35.5 L6 12.5 Z"
        fill="url(#hex-grad)" stroke="#8b5cf6" stroke-width="0.5" opacity="0.95"/>

  <!-- Inner hex ring -->
  <path d="M24 6 L39 14.5 L39 33.5 L24 42 L9 33.5 L9 14.5 Z"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- "rs" text -->
  <text x="24" y="29"
        text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="16"
        font-weight="700"
        letter-spacing="-0.5"
        fill="white"
        opacity="0.95">rs</text>

  <!-- Orange accent dot -->
  <circle cx="35" cy="13" r="4" fill="url(#bolt-grad)" filter="url(#glow)"/>
  <circle cx="35" cy="13" r="2" fill="#fff" opacity="0.9"/>
</svg>

    <!-- Structured Data — FAQPage (surfaces in Google rich results) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How much faster is rs-js than native JavaScript?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "rs-js is up to 52× faster than native JavaScript for find() with binary search, 50× faster for mapRef column projection, 6–14× faster for reduce and count, and 3–4× faster for filterMapRef columnar analytics at 500k rows."
            }
          },
          {
            "@type": "Question",
            "name": "Does rs-js work in the browser?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. rs-js ships a WebAssembly bundle for browsers (ESM via createRsJs) and a separate Node.js CommonJS build. Both use the same Rust engine compiled with wasm-pack."
            }
          },
          {
            "@type": "Question",
            "name": "How do I install rs-js?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "npm install @shaon07/rs-js — then const { RsJs } = require('@shaon07/rs-js') in Node.js, or import { createRsJs } from '@shaon07/rs-js' in the browser."
            }
          },
          {
            "@type": "Question",
            "name": "What is zero-copy in rs-js?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Zero-copy APIs (filterViewRef, mapRef, filterMapRef) return TypedArray views directly into WASM linear memory — no JavaScript objects are created, no data is copied. This is 5–52× faster than row-object output."
            }
          },
          {
            "@type": "Question",
            "name": "Is rs-js a replacement for DuckDB-WASM or Polars?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "rs-js is a lightweight embeddable query engine focused on in-memory analytics over JavaScript row arrays. It has no SQL layer and no disk persistence. It complements DuckDB-WASM for workloads where you already have JS objects and need fast repeated queries without serialization overhead."
            }
          }
        ]
      }
